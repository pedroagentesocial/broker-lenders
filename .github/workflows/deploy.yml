name: Deploy to Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-hostinger
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build Astro
        run: pnpm build

      - name: Show build output (dist)
        run: |
          echo "Build output (dist):"
          ls -la dist || true
          echo "Files (level 1-2):"
          find dist -maxdepth 2 -type f | sed 's|^| - |'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: astro-dist
          path: dist
          retention-days: 3

      - name: List remote before deploy (FTPS)
        run: |
          curl --ftp-ssl --insecure --user "${{ secrets.SFTP_USERNAME }}:${{ secrets.SFTP_PASSWORD }}" "ftp://${{ secrets.SFTP_HOST }}/domains/brokerlenders.com/public_html/" -l || true

      - name: Deploy via FTPS to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: dist/
          server-dir: domains/brokerlenders.com/public_html/
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/.DS_Store
            .well-known/**
            cgi-bin/**
            .htaccess
          timeout: 120000

      - name: List remote after deploy (FTPS)
        run: |
          curl --ftp-ssl --insecure --user "${{ secrets.SFTP_USERNAME }}:${{ secrets.SFTP_PASSWORD }}" "ftp://${{ secrets.SFTP_HOST }}/domains/brokerlenders.com/public_html/" -l || true

      - name: Check live site content
        run: |
          curl -fsSL https://brokerlenders.com -o live.html || true
          echo "Live homepage (first 40 lines):"
          sed -n '1,40p' live.html || true
      - name: Fallback deploy via SFTP (domains path)
        if: ${{ failure() }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          protocol: sftp
          port: 22
          local-dir: dist
          server-dir: domains/brokerlenders.com/public_html/