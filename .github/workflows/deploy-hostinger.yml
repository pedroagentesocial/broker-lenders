name: Deploy to Hostinger (FTP)

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: List remote public_html before deploy (FTPS)
        run: |
          curl --ftp-ssl --insecure --user "${{ secrets.HOSTINGER_FTP_USERNAME }}:${{ secrets.HOSTINGER_FTP_PASSWORD }}" "ftp://${{ secrets.HOSTINGER_FTP_SERVER }}/public_html/" -l || true

      - name: List remote domains path before deploy (FTPS)
        run: |
          curl --ftp-ssl --insecure --user "${{ secrets.HOSTINGER_FTP_USERNAME }}:${{ secrets.HOSTINGER_FTP_PASSWORD }}" "ftp://${{ secrets.HOSTINGER_FTP_SERVER }}/domains/brokerlenders.com/public_html/" -l || true

      - name: Deploy via FTP to Hostinger (public_html)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: dist
          server-dir: public_html/
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/.DS_Store
            .well-known/**
            cgi-bin/**
            .htaccess

      - name: Deploy via FTP to Hostinger (domains path)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: dist
          server-dir: domains/brokerlenders.com/public_html/
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/.DS_Store
            .well-known/**
            cgi-bin/**
            .htaccess

      - name: List remote public_html after deploy (FTPS)
        run: |
          curl --ftp-ssl --insecure --user "${{ secrets.HOSTINGER_FTP_USERNAME }}:${{ secrets.HOSTINGER_FTP_PASSWORD }}" "ftp://${{ secrets.HOSTINGER_FTP_SERVER }}/public_html/" -l || true

      - name: List remote domains path after deploy (FTPS)
        run: |
          curl --ftp-ssl --insecure --user "${{ secrets.HOSTINGER_FTP_USERNAME }}:${{ secrets.HOSTINGER_FTP_PASSWORD }}" "ftp://${{ secrets.HOSTINGER_FTP_SERVER }}/domains/brokerlenders.com/public_html/" -l || true
